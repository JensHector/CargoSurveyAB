version: 2
updates:
  # Bevakar npm-paket (package.json) – aktiveras när/om npm-beroenden läggs till
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Bevakar GitHub Actions-versioner
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
