<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inlägg | Ignicon AB</title>
    <meta name="description" content="Artiklar om ledarskap, grupputveckling och organisationsutveckling från Ignicon AB.">
    <link rel="canonical" href="https://ignicon.se/inlagg.html">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Ignicon AB">
    <meta property="og:locale" content="sv_SE">
    <link rel="icon" type="image/svg+xml" href="/logga_transparent.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #202032;
            --orange: #E36020;
            --white: #FFFFFF;
            --beige: #F5F0E8;
            --light-gray: #F8F8F6;
            --border:     #DDD8D2;
            --gray:       #464553;
            --gray-light: #706E7C;
            --accent:      #E36020;
            --accent-dark: #B84F18;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; scroll-padding-top: 116px; }
        body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--navy); }
        section { padding: 96px 0; }

        .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1400; height: 32px; display: flex; align-items: center; justify-content: center; background: #0a1525; border-bottom: 1px solid rgba(227,96,32,0.25); color: rgba(255,255,255,0.55); font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; }
        .nav { position: fixed; top: 32px; left: 0; right: 0; z-index: 1300; will-change: transform; background: var(--navy); height: 68px; display: flex; align-items: center; padding: 0; border-bottom: 1px solid rgba(255,255,255,0.06); transition: box-shadow 0.3s ease; }
        .nav.scrolled { box-shadow: 0 4px 32px rgba(0,0,0,0.3); }
        .nav-inner { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; position: relative; padding: 0 24px; }
        .nav-logo { display: flex; align-items: center; text-decoration: none; }
        .nav-logo-img { height: 56px; width: auto; display: block; }

        .nav-links { display: flex; align-items: center; gap: 34px; margin-left: 40px; }
        .nav-mobile-only { display: none !important; }
        .nav-links a { display: block; padding: 8px 14px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.80); text-decoration: none; letter-spacing: 0.03em; border-radius: 4px; transition: color 0.2s, background 0.2s; white-space: nowrap; position: relative; }
        .nav-links a:hover { color: var(--white); background: rgba(255,255,255,0.06); }
        .nav-links a.active { color: var(--accent-dark); }
        .nav-links a:not(.nav-cta)::after { content: ""; position: absolute; left: 0; bottom: -6px; width: 0%; height: 2px; background: var(--accent); transition: .2s; }
        .nav-links a:not(.nav-cta):hover::after, .nav-links a:not(.nav-cta).active::after { width: 100%; }

        .nav-cta { background: linear-gradient(180deg, var(--accent), var(--accent-dark)) !important; color: var(--white) !important; padding: 10px 22px !important; border-radius: 12px !important; font-size: 13px !important; font-weight: 700 !important; letter-spacing: 0.04em !important; box-shadow: 0 14px 34px rgba(227,96,32,.25); transition: .2s !important; text-decoration: none; white-space: nowrap; }
        .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(227,96,32,.35); background: linear-gradient(180deg, var(--accent), var(--accent-dark)) !important; color: var(--white) !important; }
        .nav-burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
        .nav-burger span { display: block; width: 22px; height: 2px; background: var(--white); border-radius: 2px; transition: transform 0.3s ease, opacity 0.3s ease; }
        .nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .nav-burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .post-hero { background: var(--navy); padding: 148px 48px 60px; position: relative; overflow: hidden; }
        .post-hero-inner { max-width: 800px; margin: 0 auto; }
        .post-eyebrow { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .back-link { font-size: 13px; color: rgba(255,255,255,0.45); text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: var(--orange); }
        .post-category { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; color: var(--orange); text-transform: uppercase; }
        .post-hero h1 { font-size: clamp(28px, 4vw, 46px); font-weight: 700; color: var(--white); line-height: 1.15; margin-bottom: 20px; }
        .post-meta { font-size: 13px; color: rgba(255,255,255,0.4); }
        .post-meta span { margin-right: 16px; }
        .hero-bg-text { position: absolute; right: -20px; top: 50%; transform: translateY(-50%); font-size: clamp(60px, 10vw, 130px); font-weight: 900; color: rgba(255,255,255,0.03); pointer-events: none; white-space: nowrap; text-transform: uppercase; }

        .post-body { max-width: 800px; margin: 0 auto; padding: 60px 48px 80px; }
        .post-body h2 { font-size: 24px; font-weight: 700; margin: 40px 0 16px; }
        .post-body h3 { font-size: 19px; font-weight: 700; margin: 32px 0 12px; }
        .post-body p { font-size: 17px; line-height: 1.8; color: #333; margin-bottom: 20px; }
        .post-body strong { color: var(--navy); font-weight: 700; }
        .post-body ol, .post-body ul { padding-left: 24px; margin-bottom: 20px; }
        .post-body li { font-size: 17px; line-height: 1.8; color: #333; margin-bottom: 8px; }
        .post-body a { color: var(--orange); text-decoration: none; border-bottom: 1px solid rgba(232,87,26,0.3); }
        .post-body blockquote { border-left: 3px solid var(--orange); margin: 32px 0; padding: 16px 24px; background: var(--light-gray); border-radius: 0 8px 8px 0; }
        .post-body blockquote p { color: var(--navy); font-style: italic; margin: 0; }

        .post-cta { background: var(--navy); border-radius: 12px; padding: 48px; text-align: center; max-width: 800px; margin: 0 auto 80px; }
        .post-cta h3 { font-size: 24px; font-weight: 700; color: var(--white); margin-bottom: 12px; }
        .post-cta p { color: rgba(255,255,255,0.6); font-size: 15px; margin-bottom: 28px; }
        .cta-btn { display: inline-block; background: var(--orange); color: var(--white); padding: 14px 32px; border-radius: 8px; font-weight: 700; font-size: 15px; text-decoration: none; transition: background 0.2s; }
        .cta-btn:hover { background: #d44e16; }

        .back-section { text-align: center; padding: 0 48px 60px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--navy); font-size: 14px; font-weight: 600; text-decoration: none; border: 2px solid rgba(0,0,0,0.15); padding: 10px 24px; border-radius: 100px; transition: all 0.2s; }
        .back-btn:hover { border-color: var(--orange); color: var(--orange); }

        footer { background: var(--navy); padding: 32px 48px; text-align: center; }
        footer p { color: rgba(255,255,255,0.4); font-size: 13px; }
        .loading { padding: 140px 48px; text-align: center; color: #999; font-size: 16px; }

        @media (min-width: 1024px) {
          .hero h1 { font-size: 64px; line-height: 1.05; letter-spacing: -0.03em; }
          .section-title { font-size: 40px; letter-spacing: -0.02em; }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: flex; flex-direction: column;
                position: absolute; top: 68px; left: 0; right: 0;
                background: var(--navy); padding: 16px 24px 24px;
                border-bottom: 1px solid rgba(255,255,255,0.08);
                gap: 4px;
                transform: translateY(-8px);
                opacity: 0;
                pointer-events: none;
                transition: transform .18s ease, opacity .18s ease;
            }

            body.nav-open .nav-links { transform: translateY(0); opacity: 1; pointer-events: auto; }
            .nav-burger { display: flex; }
            .nav-cta-right { display: none; }
            .nav-mobile-only { display: block !important; }
            .post-hero { padding: 124px 20px 48px; }
            .post-body { padding: 40px 20px 60px; }
            .back-link { color: rgba(255,255,255,0.70); }
            .post-meta { color: rgba(255,255,255,0.62); }
            .post-cta p { font-size: 16px; color: rgba(255,255,255,0.82); }
            .post-cta { margin: 0 20px 60px; padding: 32px 24px; }
            .back-section { padding: 0 20px 48px; }
        }
        .nav-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.45); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 1200; }
        body.nav-open .nav-overlay { opacity: 1; pointer-events: auto; }
        body.nav-open { overflow: hidden; }
        @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
            .nav, .nav-overlay { backdrop-filter: none; -webkit-backdrop-filter: none; }
        }
    </style>
</head>

    <div class="nav-burger" id="navBurger">
      <span></span><span></span><span></span>

  </div>
</nav>
<div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

</html>
